<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vogue Productions — Leads Database</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--pk:#FF2D7E;--gold:#C9A84C;--bg:#050810;--bg2:#0a1228;--card:#111828;--border:rgba(255,45,126,.2);--white:#fff;--gray:#999;--green:#25D366;--red:#ff4d4d}
body{background:var(--bg);color:var(--white);font-family:'Montserrat',sans-serif;min-height:100vh}

/* HEADER */
.db-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:18px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:12px}
.db-logo{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;color:var(--pk)}
.db-logo span{color:var(--white)}
.hbtns{display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:9px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'Montserrat',sans-serif;transition:all .2s;letter-spacing:.5px}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#20bd5a}
.btn-gold{background:var(--gold);color:#000}
.btn-gold:hover{background:#e8c97a}
.btn-red{background:rgba(255,77,77,.15);color:var(--red);border:1px solid var(--red)}
.btn-red:hover{background:rgba(255,77,77,.3)}
.btn-blue{background:rgba(100,140,255,.15);color:#7ab0ff;border:1px solid rgba(100,140,255,.3)}
.btn-blue:hover{background:rgba(100,140,255,.3)}

/* STATS */
.stats-bar{display:flex;gap:16px;padding:24px 32px;flex-wrap:wrap}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 22px;flex:1;min-width:140px}
.stat-num{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;color:var(--pk);line-height:1}
.stat-lbl{font-size:11px;color:var(--gray);margin-top:5px;letter-spacing:1px}
.stat.green .stat-num{color:var(--green)}
.stat.gold .stat-num{color:var(--gold)}
.stat.blue .stat-num{color:#7ab0ff}

/* FILTERS */
.filters{padding:0 32px 16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.filt-btn{padding:6px 16px;border-radius:50px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.12);background:transparent;color:var(--gray);transition:all .2s;font-family:'Montserrat',sans-serif}
.filt-btn.active,.filt-btn:hover{border-color:var(--pk);color:var(--pk);background:rgba(255,45,126,.08)}
.search-box{padding:7px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:var(--card);color:var(--white);font-size:12px;outline:none;font-family:'Montserrat',sans-serif;min-width:200px}
.search-box:focus{border-color:var(--pk)}
.search-box::placeholder{color:rgba(255,255,255,.25)}

/* TABLE */
.table-wrap{padding:0 32px 40px;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:900px}
thead th{background:var(--bg2);padding:11px 14px;font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(255,255,255,.05);transition:background .15s}
tbody tr:hover{background:rgba(255,45,126,.05)}
td{padding:11px 14px;font-size:12px;color:rgba(255,255,255,.82);vertical-align:middle}
td .status{display:inline-block;padding:3px 10px;border-radius:50px;font-size:10px;font-weight:600;letter-spacing:.5px}
.s-booked{background:rgba(37,211,102,.15);color:var(--green);border:1px solid rgba(37,211,102,.3)}
.s-partial{background:rgba(255,165,0,.1);color:#ffa500;border:1px solid rgba(255,165,0,.25)}
.s-budget{background:rgba(100,140,255,.12);color:#7ab0ff;border:1px solid rgba(100,140,255,.25)}
.s-pkg{background:rgba(201,168,76,.12);color:var(--gold);border:1px solid rgba(201,168,76,.25)}
.s-declined{background:rgba(255,77,77,.1);color:var(--red);border:1px solid rgba(255,77,77,.2)}
td .del-btn{background:none;border:none;color:rgba(255,77,77,.5);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;transition:all .2s}
td .del-btn:hover{color:var(--red);background:rgba(255,77,77,.1)}
.empty{text-align:center;padding:60px;color:var(--gray);font-size:14px}
.empty span{font-size:40px;display:block;margin-bottom:12px}
.td-name{font-weight:600;color:var(--white)}
.td-phone a{color:#7ab0ff;text-decoration:none}
.td-phone a:hover{color:var(--pk)}
.td-pkg{color:var(--gold);font-size:11px}
.td-ts{font-size:10px;color:var(--gray)}
.td-budget{color:var(--green);font-weight:600}

/* EXPORT CONFIRM */
.toast{position:fixed;bottom:30px;right:30px;background:var(--green);color:#fff;padding:12px 22px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;opacity:0;transform:translateY(20px);transition:all .3s}
.toast.show{opacity:1;transform:translateY(0)}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;max-width:480px;width:90%}
.modal h3{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:12px;color:var(--pk)}
.modal p{font-size:13px;color:var(--gray);margin-bottom:24px;line-height:1.6}
.modal-btns{display:flex;gap:10px;justify-content:flex-end}

@media(max-width:600px){.stats-bar{padding:16px};.table-wrap,.filters{padding-left:16px;padding-right:16px}.db-header{padding:14px 16px}}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="modal-bg" id="clearModal">
  <div class="modal">
    <h3>Clear All Data?</h3>
    <p>This will permanently delete all <strong id="clearCount" style="color:var(--white)">0</strong> leads from the local database. This action cannot be undone.</p>
    <div class="modal-btns">
      <button class="btn btn-blue" onclick="document.getElementById('clearModal').classList.remove('open')">Cancel</button>
      <button class="btn btn-red" onclick="confirmClear()">Yes, Delete All</button>
    </div>
  </div>
</div>

<div class="db-header">
  <div>
    <div class="db-logo">VOGUE<span> PRODUCTIONS</span></div>
    <div style="font-size:10px;color:var(--gray);margin-top:3px;letter-spacing:1px">LEADS DATABASE</div>
  </div>
  <div class="hbtns">
    <button class="btn btn-blue" onclick="refreshTable()">🔄 Refresh</button>
    <button class="btn btn-green" onclick="exportCSV()">📊 Export CSV</button>
    <button class="btn btn-gold" onclick="exportXLS()">📥 Download XLS</button>
    <button class="btn btn-red" onclick="askClear()">🗑️ Clear All</button>
  </div>
</div>

<div class="stats-bar" id="statsBar">
  <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-lbl">Total Leads</div></div>
  <div class="stat green"><div class="stat-num" id="statBooked">0</div><div class="stat-lbl">Bookings</div></div>
  <div class="stat gold"><div class="stat-num" id="statPkg">0</div><div class="stat-lbl">Pkg Selected</div></div>
  <div class="stat blue"><div class="stat-num" id="statPartial">0</div><div class="stat-lbl">Partial Leads</div></div>
</div>

<div class="filters">
  <button class="filt-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filt-btn" onclick="setFilter('Booked',this)">✅ Booked</button>
  <button class="filt-btn" onclick="setFilter('Package Selected',this)">🎁 Pkg Selected</button>
  <button class="filt-btn" onclick="setFilter('Budget',this)">💰 Budget Submitted</button>
  <button class="filt-btn" onclick="setFilter('Partial',this)">📝 Partial</button>
  <button class="filt-btn" onclick="setFilter('Declined',this)">❌ Declined</button>
  <input class="search-box" id="searchBox" placeholder="🔍 Search by name, phone, city..." oninput="refreshTable()">
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Phone</th>
        <th>City / Area</th>
        <th>Month</th>
        <th>Budget</th>
        <th>Package</th>
        <th>Shoot Date</th>
        <th>Status</th>
        <th>Captured</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
var currentFilter='all';

function getDB(){
  try{return JSON.parse(localStorage.getItem('vpLeads'))||[];}
  catch(e){return[];}
}
function saveDB(db){
  try{localStorage.setItem('vpLeads',JSON.stringify(db));}catch(e){}
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filt-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  refreshTable();
}

function statusClass(s){
  if(!s) return 's-partial';
  var sl=s.toLowerCase();
  if(sl.includes('book')) return 's-booked';
  if(sl.includes('package')) return 's-pkg';
  if(sl.includes('budget')) return 's-budget';
  if(sl.includes('decline')) return 's-declined';
  return 's-partial';
}

function fmtDate(iso){
  if(!iso) return '—';
  try{
    var d=new Date(iso);
    return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  }catch(e){return iso.substring(0,16).replace('T',' ');}
}

function refreshTable(){
  var db=getDB();
  var search=(document.getElementById('searchBox').value||'').toLowerCase();

  // Stats
  document.getElementById('statTotal').textContent=db.length;
  document.getElementById('statBooked').textContent=db.filter(function(r){return (r.status||'').toLowerCase().includes('book');}).length;
  document.getElementById('statPkg').textContent=db.filter(function(r){return (r.status||'').toLowerCase().includes('package');}).length;
  document.getElementById('statPartial').textContent=db.filter(function(r){var s=(r.status||'').toLowerCase();return s.includes('partial')||s.includes('step');}).length;

  // Filter
  var filtered=db.filter(function(r){
    if(currentFilter!=='all'){
      if(!((r.status||'').toLowerCase().includes(currentFilter.toLowerCase()))) return false;
    }
    if(search){
      var hay=((r.name||'')+(r.phone||'')+(r.address||'')+(r.package||'')).toLowerCase();
      if(!hay.includes(search)) return false;
    }
    return true;
  });

  // Sort newest first
  filtered.sort(function(a,b){return new Date(b.updated||b.timestamp)-new Date(a.updated||a.timestamp);});

  var tbody=document.getElementById('tableBody');
  if(filtered.length===0){
    tbody.innerHTML='<tr><td colspan="11"><div class="empty"><span>📋</span>No leads found.<br>Leads will appear here as visitors fill the form on your landing page.</div></td></tr>';
    return;
  }
  tbody.innerHTML=filtered.map(function(r,i){
    var waLink=r.phone?'<a href="https://wa.me/91'+r.phone.replace(/\D/g,'')+'" target="_blank">'+r.phone+'</a>':'—';
    return '<tr>'+
      '<td style="color:var(--gray);font-size:11px">'+(i+1)+'</td>'+
      '<td class="td-name">'+(r.name||'—')+'</td>'+
      '<td class="td-phone">'+waLink+'</td>'+
      '<td>'+(r.address||'—')+'</td>'+
      '<td>'+(r.month||'—')+'</td>'+
      '<td class="td-budget">'+(r.budget||'—')+'</td>'+
      '<td class="td-pkg">'+(r.package||'—')+'</td>'+
      '<td>'+(r.date||'—')+'</td>'+
      '<td><span class="status '+statusClass(r.status)+'">'+(r.status||'Partial')+'</span></td>'+
      '<td class="td-ts">'+fmtDate(r.updated||r.timestamp)+'</td>'+
      '<td><button class="del-btn" onclick="deleteLead(\''+r.id+'\')" title="Delete">🗑</button></td>'+
    '</tr>';
  }).join('');
}

function deleteLead(id){
  var db=getDB().filter(function(r){return r.id!==id;});
  saveDB(db);
  refreshTable();
  toast('Lead deleted');
}

function askClear(){
  document.getElementById('clearCount').textContent=getDB().length;
  document.getElementById('clearModal').classList.add('open');
}
function confirmClear(){
  localStorage.removeItem('vpLeads');
  document.getElementById('clearModal').classList.remove('open');
  refreshTable();
  toast('All leads cleared');
}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2800);
}

/* ─── EXPORT CSV ─────────────────────────────────── */
function exportCSV(){
  var db=getDB();
  if(!db.length){toast('No data to export');return;}
  var cols=['ID','Timestamp','Updated','Name','Phone','City/Area','Pregnancy Month','Budget','Package','Shoot Date','Message','Status','Page'];
  var rows=[cols];
  db.forEach(function(r){
    rows.push([r.id,r.timestamp,r.updated,r.name,r.phone,r.address,r.month,r.budget,r.package,r.date,r.msg,r.status,r.page]);
  });
  var csv=rows.map(function(row){
    return row.map(function(v){
      var s=(v||'').toString().replace(/"/g,'""');
      return '"'+s+'"';
    }).join(',');
  }).join('\n');
  download('VoguePro_Leads_'+today()+'.csv', 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv));
  toast('✅ CSV exported!');
}

/* ─── EXPORT XLS (HTML table that Excel opens) ──── */
function exportXLS(){
  var db=getDB();
  if(!db.length){toast('No data to export');return;}
  var cols=['#','Name','Phone','City/Area','Pregnancy Month','Budget','Package','Shoot Date','Status','Captured On'];
  var hdr=cols.map(function(c){return '<th style="background:#FF2D7E;color:#fff;padding:8px 12px;font-size:12px;white-space:nowrap">'+c+'</th>';}).join('');
  var body=db.map(function(r,i){
    var cells=[
      i+1, r.name||'', r.phone||'', r.address||'', r.month||'',
      r.budget||'', r.package||'', r.date||'', r.status||'Partial',
      (r.updated||r.timestamp||'').replace('T',' ').substring(0,16)
    ];
    var bgColor=i%2===0?'#f8f8ff':'#ffffff';
    return '<tr style="background:'+bgColor+'">'+cells.map(function(v){
      return '<td style="padding:7px 12px;border:1px solid #eee;font-size:12px">'+v+'</td>';
    }).join('')+'</tr>';
  }).join('');

  var html='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><style>body{font-family:Arial,sans-serif}</style></head><body>'+
    '<h2 style="font-family:Arial;color:#FF2D7E;margin-bottom:4px">Vogue Productions — Maternity Leads</h2>'+
    '<p style="font-family:Arial;font-size:12px;color:#888;margin-bottom:16px">Generated: '+new Date().toLocaleString('en-IN')+'</p>'+
    '<table border="1" style="border-collapse:collapse">'+
    '<thead><tr>'+hdr+'</tr></thead>'+
    '<tbody>'+body+'</tbody></table></body></html>';

  download('VoguePro_Leads_'+today()+'.xls','data:application/vnd.ms-excel;charset=utf-8,'+encodeURIComponent(html));
  toast('✅ XLS downloaded! Open with Excel.');
}

function today(){
  return new Date().toISOString().split('T')[0];
}
function download(filename,dataUrl){
  var a=document.createElement('a');
  a.href=dataUrl; a.download=filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
}

// Init
refreshTable();
// Auto-refresh every 30 seconds
setInterval(refreshTable, 30000);
</script>
</body>
</html>
